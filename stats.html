<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحصائيات المنصة | جلال أكاديمي</title>
    
    <link rel="icon" type="image/jpeg" href="mylogo.png.jpeg">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="background-glow"></div>
    
    <header style="position: relative; padding: 40px 20px; text-align: center;">
        
        <div onclick="history.back()" style="position: absolute; left: 20px; top: 25px; cursor: pointer; color: white; display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;" onmouseover="this.style.background='var(--primary)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">
            <i class="fas fa-arrow-left" style="font-size: 0.9rem;"></i>
            <span style="font-size: 0.9rem; font-weight: bold;">رجوع</span>
        </div>

        <div style="position: absolute; right: 20px; top: 20px;">
            <img src="mylogo.png.jpeg" alt="Logo" 
                 onclick="window.location.href='index.html'"
                 style="width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--primary); 
                        box-shadow: 0 0 20px var(--primary); cursor: pointer; transition: 0.3s;">
        </div>

        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer; display: inline-block;">
            PLATFORM <span>STATS</span>
        </div>
        <p class="tagline">أرقام وإنجازات منصة جلال أكاديمي</p>
    </header>

    <main class="container">
        <div class="grid">
            <div class="card">
                <div class="icon" style="color: var(--primary);"><i class="fas fa-users"></i></div>
                <h2>الطلاب المسجلين</h2>
                <p style="font-size: 2rem; font-weight: bold; margin: 10px 0;">294</p>
                <div class="badge">طالب وطالبة</div>
            </div>

            <div class="card">
                <div class="icon"><i class="fas fa-layer-group"></i></div>
                <h2>المسارات التعليمية</h2>
                <p style="font-size: 2rem; font-weight: bold; margin: 10px 0;">23+</p>
                <div class="badge">مسار متخصص</div>
            </div>

            <div class="card">
                <div class="icon" style="color: #ff0000;"><i class="fas fa-play-circle"></i></div>
                <h2>المحاضرات المرئية</h2>
                <p style="font-size: 2rem; font-weight: bold; margin: 10px 0;">99+</p>
                <div class="badge">فيديو تعليمي</div>
            </div>

            <div class="card">
                <div class="icon" style="color: #2ecc71;"><i class="fas fa-file-pdf"></i></div>
                <h2>الملفات والملخصات</h2>
                <p style="font-size: 2rem; font-weight: bold; margin: 10px 0;">50+</p>
                <div class="badge">ملف PDF</div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
