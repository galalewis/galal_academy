<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسار الثانوي | جلال أكاديمي</title>
    
    <link rel="icon" type="image/jpeg" href="mylogo.png.jpeg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00e0ff;
            --sec1-color: #00d4ff;
            --sec2-color: #00ff88;
            --sec3-color: #ffcc00;
            /* ألوان السوشيال ميديا الرسمية */
            --fb: #1877F2; --wa: #25D366; --ig: #E4405F; 
            --tk: #ffffff; --yt: #FF0000; --li: #0A66C2; --vf: #e60000;
        }

        body { 
            opacity: 0; 
            transition: opacity 0.5s ease-in; 
            background-color: #000; 
            color: #fff; 
            overflow-x: hidden;
            font-family: 'Tajawal', sans-serif;
        }
        body.auth-checked { opacity: 1; }

        .background-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 20%, #0d2830 0%, #000 70%);
            z-index: -1;
        }

        header { position: relative; padding: 40px 20px; text-align: center; }

        .special-tagline {
            color: var(--primary);
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 10px;
            display: inline-block;
            text-shadow: 0 0 10px rgba(0, 224, 255, 0.3);
        }

        /* تنسيق الكروت والأنيميشن */
        .grid .card {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .card:nth-child(1), .card:nth-child(2) { animation-delay: 0.2s; --hover-clr: var(--sec1-color); }
        .card:nth-child(3), .card:nth-child(4) { animation-delay: 0.4s; --hover-clr: var(--sec2-color); }
        .card:nth-child(5), .card:nth-child(6) { animation-delay: 0.6s; --hover-clr: var(--sec3-color); }

        .card:hover {
            transform: scale(1.05) translateY(-10px);
            border-color: var(--hover-clr);
            box-shadow: 0 0 30px var(--hover-clr);
            background: rgba(255, 255, 255, 0.1);
        }

        /* الفوتر والـ 7 لوجو */
        footer { 
            background: rgba(5, 5, 5, 0.95); 
            padding: 50px 20px; 
            margin-top: 60px; 
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .social-grid { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            flex-wrap: wrap; 
            max-width: 1000px; 
            margin: 0 auto;
        }
        .social-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            width: 100px; 
            transition: 0.3s;
        }
        .social-circle {
            width: 55px; height: 55px; border-radius: 50%; 
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; 
            color: #fff; font-size: 1.5rem; 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .social-item span { font-size: 0.8rem; margin-top: 10px; color: #888; }
        
        /* تأثيرات الألوان عند الوقوف على الأيقونات */
        .wa:hover .social-circle { color: var(--wa); border-color: var(--wa); box-shadow: 0 0 15px var(--wa); }
        .fb:hover .social-circle { color: var(--fb); border-color: var(--fb); box-shadow: 0 0 15px var(--fb); }
        .tk:hover .social-circle { color: var(--tk); border-color: var(--tk); box-shadow: 0 0 15px var(--tk); }
        .ig:hover .social-circle { color: var(--ig); border-color: var(--ig); box-shadow: 0 0 15px var(--ig); }
        .yt:hover .social-circle { color: var(--yt); border-color: var(--yt); box-shadow: 0 0 15px var(--yt); }
        .li:hover .social-circle { color: var(--li); border-color: var(--li); box-shadow: 0 0 15px var(--li); }
        .vf:hover .social-circle { color: var(--vf); border-color: var(--vf); box-shadow: 0 0 15px var(--vf); }
        .social-item:hover span { color: #fff; }
        .social-item:active .social-circle { transform: rotate(360deg); }

        .vf-num { font-size: 0.7rem; color: var(--vf); font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

        <div class="logo" style="font-size: 2.5rem; font-weight: bold;">GALAL <span style="color: var(--primary);">SECONDARY</span></div>
        <div class="special-tagline">جلال عويس  - خاص بطلاب الثانويه العامة</div>

    <main class="container" style="max-width: 1100px; margin: 40px auto; padding: 20px;">

            <div class="card" onclick="location.href='sec3-t1.html'"><h2>ثالثة ثانوي - ترم 1</h2></div>
            <div class="card" onclick="location.href='sec3-t2.html'"><h2>ثالثة ثانوي - ترم 2</h2></div>

    </main>

    <footer>
        <div class="social-grid">

            <a href="https://www.facebook.com/share/1KyWePKFbn/" target="_blank" class="social-item fb"><div class="social-circle"><i class="fab fa-facebook-f"></i></div><span>فيسبوك</span></a>
            <a href="https://www.tiktok.com/@galal.ewis" target="_blank" class="social-item tk"><div class="social-circle"><i class="fab fa-tiktok"></i></div><span>تيك توك</span></a>

    <script type="module">
        // كود Firebase للتحقق (نفس الإعدادات السابقة)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9Qc20GONhXuUn-m_rV1WrHNJ3nj_Txl4",
            authDomain: "galal-academy.firebaseapp.com",
            projectId: "galal-academy",
            storageBucket: "galal-academy.firebasestorage.app",
            messagingSenderId: "713668412187",
            appId: "1:713668412187:web:e2ab1024c6422c76d389be"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "students", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && docSnap.data().track === "secondary") {
                    document.body.classList.add('auth-checked'); 
                } else {
                    window.location.href = "dashboard.html";
                }
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
