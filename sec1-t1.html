    <style>
        :root {
            --primary-blue: #00e0ff;
            --bg-dark: #000000;
            --card-bg: rgba(255, 255, 255, 0.05);
            /* ألوان المنصات */
            --fb: #1877F2; --wa: #25D366; --ig: #E4405F; 
            --tk: #ffffff; --yt: #FF0000; --li: #0A66C2; --vf: #e60000;

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
        }

        .background-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 20%, #0d2830 0%, #000 70%);
            z-index: -1;
        }

        /* الهيدر: اللوجو يمين والرجوع يسار */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            position: relative;
        }

        .top-logo {
            width: 60px; height: 60px; border-radius: 50%;
            border: 2px solid var(--primary-blue); box-shadow: 0 0 15px var(--primary-blue);
        }

        .back-btn {
            background: var(--primary-blue); color: #000;
            padding: 10px 25px; border-radius: 50px;
            text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .back-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--primary-blue); }

        /* المحتوى الرئيسي في المنتصف */
        .hero { text-align: center; margin-top: 20px; }
        .profile-img {
            width: 130px; height: 130px; border-radius: 50%;
            border: 3px solid var(--primary-blue); box-shadow: 0 0 30px var(--primary-blue);
            margin-bottom: 15px;
        }
        .hero h1 { font-size: 1.8rem; margin: 15px 20px; line-height: 1.5; }

        /* أزرار الجروبات */
        .groups { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 40px; }
        .group-btn {
            padding: 12px 25px; border-radius: 50px; text-decoration: none; color: #fff;
            font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-wa { background: #25d366; }
        .btn-tg { background: #0088cc; }
        .btn-paid { background: #ffcc00; color: #000; }
        .group-btn:hover { transform: translateY(-5px); filter: brightness(1.2); }

        /* شبكة الكروت التعليمية */
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .card {
            background: var(--card-bg); padding: 40px 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            text-decoration: none; color: #fff; transition: 0.4s;
        }
        .card:hover { border-color: var(--primary-blue); transform: translateY(-10px); background: rgba(0,224,255,0.05); }
        .card i { font-size: 3rem; color: var(--primary-blue); margin-bottom: 15px; }

        /* الفوتر الخارق */
        footer { background: #050505; padding: 50px 20px; margin-top: 50px; text-align: center; }
        .social-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .social-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; width: 90px; }
        .social-circle {
            width: 55px; height: 55px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; color: #fff;
            font-size: 1.5rem; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .social-item span { font-size: 0.8rem; margin-top: 8px; color: #888; transition: 0.3s; }

        /* تأثير الدوران عند الضغط والتلوين عند الوقوف */
        .social-item:active .social-circle { transform: rotate(360deg); }
        
        .fb:hover .social-circle { color: var(--fb); border-color: var(--fb); box-shadow: 0 0 15px var(--fb); }
        .wa:hover .social-circle { color: var(--wa); border-color: var(--wa); box-shadow: 0 0 15px var(--wa); }
        .tk:hover .social-circle { color: var(--tk); border-color: var(--tk); box-shadow: 0 0 15px var(--tk); }
        .ig:hover .social-circle { color: var(--ig); border-color: var(--ig); box-shadow: 0 0 15px var(--ig); }
        .yt:hover .social-circle { color: var(--yt); border-color: var(--yt); box-shadow: 0 0 15px var(--yt); }
        .li:hover .social-circle { color: var(--li); border-color: var(--li); box-shadow: 0 0 15px var(--li); }
        .vf:hover .social-circle { color: var(--vf); border-color: var(--vf); box-shadow: 0 0 15px var(--vf); }
        .social-item:hover span { color: #fff; }

        .vf-num { font-size: 0.7rem; color: var(--vf); font-weight: bold; margin-bottom: 2px; }
    </style>
</head>
