<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | جلال أكاديمي</title>
    
    <link rel="icon" type="image/jpeg" href="mylogo.png.jpeg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .top-nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .back-btn-box {
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1a1a;
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid var(--primary);
            transition: 0.3s;
            text-decoration: none;
            font-weight: bold;
        }

        .back-btn-box:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
            transform: scale(1.05);
        }

        .nav-logo {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px var(--primary);
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-logo:hover {
            transform: rotate(360deg) scale(1.1);
        }

        .login-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card-main {
            background: rgba(15, 15, 15, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            position: relative;
            z-index: 100;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0 20px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #000;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .submit-btn:hover {
            box-shadow: 0 0 20px var(--primary);
            filter: brightness(1.2);
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="top-nav">
        <div class="back-btn-box" onclick="location.href='index.html'">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </div>
        <img src="mylogo.png.jpeg" alt="Logo" class="nav-logo" onclick="location.href='index.html'">
    </div>

    <div class="login-wrapper">
        <div class="logo" style="margin-bottom: 30px;">GALAL <span>LOGIN</span></div>
        
        <div class="login-card-main">
            <h3 style="text-align: center; color: #fff; margin-bottom: 25px;">تسجيل الدخول للمنصة</h3>
            <form id="loginForm">
                <label style="color: #ccc;">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
                
                <label style="color: #ccc;">كلمة المرور</label>
                <input type="password" id="password" placeholder="****" required>
                
                <button type="submit" class="submit-btn">دخول للمنصة</button>
            </form>
            <p style="text-align: center; margin-top: 25px; color: #888; font-size: 0.9rem;">
                ليس لديك حساب؟ <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: bold;">سجل الآن</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9Qc20GONhXuUn-m_rV1WrHNJ3nj_Txl4",
            authDomain: "galal-academy.firebaseapp.com",
            projectId: "galal-academy",
            storageBucket: "galal-academy.firebasestorage.app",
            messagingSenderId: "713668412187",
            appId: "1:713668412187:web:e2ab1024c6422c76d389be"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = e.target.querySelector('button');

            btn.innerText = "جاري التحقق...";
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                alert("أهلاً بك يا بطل!");
                window.location.href = "dashboard.html"; // التوجيه للوحة التحكم
            } catch (error) {
                alert("خطأ في البيانات، تأكد من الإيميل والباسورد.");
                btn.innerText = "دخول للمنصة";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
